<!DOCTYPE html>
<html>
<head>
    <title>Coral Health Monitoring</title>
</head>
<body>
    <h1>🌊 Coral Reef Health Monitoring</h1>

    <form method="POST" enctype="multipart/form-data">
        <input type="file" name="file" required>
        <button type="submit">Predict</button>
    </form>

    {% if result %}
        <h2>Result: {{ result }}</h2>
    {% endif %}
</body>
</html>
